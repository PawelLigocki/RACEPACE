<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pace Calculation</title>
</head>
<body>
    <h1>Pace Calculation Form</h1>
    <form action="#" method="post">
        <label for="distance">Distance (in miles):</label>
        <input type="text" id="distance" name="distance" required><br><br>
        <label for="time">Time (HH:MM:SS):</label>
        <input type="text" id="time" name="time" required><br><br>
        <input type="submit" value="Calculate Pace">
    </form>
</body>
</html>
