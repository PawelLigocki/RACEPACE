<!DOCTYPE html>
<html>
<head>
    <title>RaceCalc</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        h1 { text-align: center; }

        form {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input, select, button {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>🏃 Race Calculator</h1>

<h2>Pace</h2>
<form action="/pace-ui" method="get">

    <label>Distance:</label>
    <select name="pace_distance_choice">
        <option value="5">5 km</option>
        <option value="10">10 km</option>
        <option value="21.1">Half Marathon</option>
        <option value="42.2">Marathon</option>
        <option value="custom">Custom</option>
    </select>

    <input type="number" step="0.1" name="pace_custom_distance" placeholder="Custom distance (km)">

    <label>Time:</label>
    <input type="number" name="pace_hours" placeholder="Hours">
    <input type="number" name="pace_minutes" placeholder="Minutes">
    <input type="number" name="pace_seconds" placeholder="Seconds">

    <button type="submit">Calculate Pace</button>
</form>

<h2>Predict</h2>
<form action="/predict-ui" method="get">

    <label>Distance:</label>
    <select name="predict_distance_choice">
        <option value="5">5 km</option>
        <option value="10">10 km</option>
        <option value="21.1">Half Marathon</option>
        <option value="42.2">Marathon</option>
        <option value="custom">Custom</option>
    </select>

    <input type="number" step="0.1" name="predict_custom_distance" placeholder="Custom distance (km)">

    <label>Target distance:</label>
    <select name="predict_target">
        <option value="5">5 km</option>
        <option value="10">10 km</option>
        <option value="21.1">Half Marathon</option>
        <option value="42.2">Marathon</option>
    </select>

    <label>Time:</label>
    <input type="number" name="predict_hours" placeholder="Hours">
    <input type="number" name="predict_minutes" placeholder="Minutes">
    <input type="number" name="predict_seconds" placeholder="Seconds">

    <button type="submit">Predict</button>
</form>

{% if result %}
<div class="result">
    <h3>Result:</h3>
    <p>{{ result }}</p>
</div>
{% endif %}

</body>
</html>
