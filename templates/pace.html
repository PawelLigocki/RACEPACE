<!DOCTYPE html>
<html>
<head>
    <title>Pace Result</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
        .result { background: #f0f0f0; padding: 15px; border-radius: 8px; margin-top: 20px; }
        h1 { text-align: center; }
    </style>
</head>
<body>
<h1>Pace Result</h1>

{% if result %}
<div class="result">
    <h3>Your Pace:</h3>
    <p>{{ result }}</p>
</div>
{% endif %}

<a href="/ui">← Back to Calculator</a>
</body>
</html>
