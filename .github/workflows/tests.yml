name: Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install deps
        run: |
          pip install pytest pytest-cov hypothesis fastapi uvicorn httpx jinja2

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps
          
      - name: Run tests
        run: |
          pytest --cov=app